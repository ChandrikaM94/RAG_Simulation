<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Simulator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background:#f5f5f7;
min-height:100vh;
padding:40px;
color:#1d1d1f;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:48px;
font-weight:700;
letter-spacing:-2px;
}

.header p{
color:#6e6e73;
margin-top:10px;
font-size:18px;
}

.input-card{
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 10px 40px rgba(0,0,0,0.05);
margin-bottom:30px;
}

textarea{
width:100%;
height:120px;
border:none;
background:#f7f7f7;
border-radius:16px;
padding:20px;
font-size:16px;
resize:none;
outline:none;
}

button{
margin-top:15px;
background:#0071e3;
color:white;
border:none;
padding:14px 28px;
border-radius:999px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:.3s;
}

button:hover{
background:#0062c7;
}

.steps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.8);
backdrop-filter:blur(20px);
border-radius:24px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
opacity:0;
transform:translateY(20px);
transition:.6s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card h2{
font-size:20px;
margin-bottom:15px;
}

.content{
line-height:1.7;
font-size:15px;
color:#444;
}

.chunk{
display:inline-block;
padding:6px 10px;
background:#eef4ff;
border-radius:10px;
margin:4px;
}

.vector{
display:flex;
gap:6px;
margin:12px 0;
}

.bar{
height:16px;
border-radius:999px;
background:#0071e3;
}

.db{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:10px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
background:#c7c7cc;
}

.dot.active{
background:#0071e3;
transform:scale(1.2);
}

.answer{
background:#f4f8ff;
padding:16px;
border-radius:16px;
margin-top:10px;
}

.flow{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:40px;
flex-wrap:wrap;
}

.flow-item{
padding:12px 20px;
background:white;
border-radius:999px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
font-size:14px;
font-weight:600;
}

.arrow{
font-size:24px;
color:#0071e3;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>RAG Simulator</h1>
<p>Visualize Retrieval-Augmented Generation Step by Step</p>
</div>

<div class="input-card">
<textarea id="query" placeholder="Ask a question..."></textarea>
<button onclick="runRAG()">Simulate RAG</button>
</div>

<div class="flow">
<div class="flow-item">Query</div>
<div class="arrow">→</div>
<div class="flow-item">Chunking</div>
<div class="arrow">→</div>
<div class="flow-item">Embeddings</div>
<div class="arrow">→</div>
<div class="flow-item">Retrieval</div>
<div class="arrow">→</div>
<div class="flow-item">Augmentation</div>
<div class="arrow">→</div>
<div class="flow-item">Generation</div>
</div>

<div class="steps">

<div class="card" id="step1">
<h2>1. Query Analysis</h2>
<div class="content" id="queryOutput"></div>
</div>

<div class="card" id="step2">
<h2>2. Chunking</h2>
<div class="content" id="chunkOutput"></div>
</div>

<div class="card" id="step3">
<h2>3. Vector Embeddings</h2>
<div class="content" id="embeddingOutput"></div>
</div>

<div class="card" id="step4">
<h2>4. Vector Database Search</h2>
<div class="content" id="retrievalOutput"></div>
</div>

<div class="card" id="step5">
<h2>5. Prompt Augmentation</h2>
<div class="content" id="augmentOutput"></div>
</div>

<div class="card" id="step6">
<h2>6. Final Generation</h2>
<div class="content" id="generationOutput"></div>
</div>

</div>

</div>

<script>

const sampleKnowledgeBase = [
"RAG stands for Retrieval Augmented Generation.",
"Embeddings convert text into numerical vectors.",
"Vector databases store embeddings efficiently.",
"Similarity search finds semantically related content.",
"LLMs use retrieved context to generate grounded answers.",
"Chunking splits large documents into smaller sections."
];

function randomEmbedding(){
return Array.from({length:8},()=>Math.floor(Math.random()*100));
}

async function runRAG(){

document.querySelectorAll('.card').forEach(card=>{
card.classList.remove('show');
});

const query=document.getElementById("query").value;

if(!query) return;

showCard(1);

document.getElementById("queryOutput").innerHTML=
`<strong>User Query:</strong><br>${query}`;

const chunks=query.split(" ");

await delay(1000);

showCard(2);

document.getElementById("chunkOutput").innerHTML=
chunks.map(word=>`<span class="chunk">${word}</span>`).join("");

await delay(1000);

showCard(3);

const embedding=randomEmbedding();

document.getElementById("embeddingOutput").innerHTML=
`
<p>Embedding Vector:</p>
${embedding.map(v=>
`<div class="vector">
<div class="bar" style="width:${v*2}px"></div>
<span>${v}</span>
</div>`
).join("")}
`;

await delay(1200);

showCard(4);

let dots="";

for(let i=0;i<25;i++){
dots+=`<div class="dot ${Math.random()>.7 ? 'active':''}"></div>`;
}

document.getElementById("retrievalOutput").innerHTML=
`
<p>Searching Vector Database...</p>
<div class="db">${dots}</div>

<br>

<p><strong>Retrieved Chunks:</strong></p>

<ul>
${sampleKnowledgeBase
.sort(()=>0.5-Math.random())
.slice(0,3)
.map(item=>`<li>${item}</li>`)
.join("")}
</ul>
`;

await delay(1200);

showCard(5);

const retrieved = sampleKnowledgeBase.slice(0,3).join(" ");

document.getElementById("augmentOutput").innerHTML=
`
<p><strong>Original Query</strong></p>
${query}

<br><br>

<p><strong>Retrieved Context</strong></p>
${retrieved}

<br><br>

<p><strong>Augmented Prompt</strong></p>

Answer the user's question using the retrieved context above.
`;

await delay(1200);

showCard(6);

document.getElementById("generationOutput").innerHTML=
`
<div class="answer">
Based on the retrieved knowledge, the model combines your
question with relevant context and generates a grounded answer.

This demonstrates how RAG prevents hallucinations by
providing external information before generation.
</div>
`;
}

function showCard(step){
document.getElementById(`step${step}`).classList.add("show");
}

function delay(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

</script>

</body>
</html>
